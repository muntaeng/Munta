services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: muntaspec
      POSTGRES_PASSWORD: ${DB_PASSWORD:-muntaspec}
      POSTGRES_DB: muntaspec
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/decarb/corpus/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muntaspec"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - DATABASE_URL=${DATABASE_URL:-postgresql://muntaspec:${DB_PASSWORD:-muntaspec}@db:5432/muntaspec}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}


volumes:
  pgdata:
