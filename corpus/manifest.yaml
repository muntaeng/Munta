#   title:       human-readable document title
#   publisher:   issuing body
#   url:         canonical download URL (PDF preferred)
#   landing:     (optional) HTML landing page if the URL is a direct asset link
#   licence:     ogl-v3 | crown-copyright | manufacturer-public | open-access | paid | unknown
#   status:      todo | downloaded | free-alt | paid | blocked
#   local_path:  expected file location once downloaded (relative to corpus/raw/)
#   notes:       any caveats, version info, why-this-doc justification
#
# Status legend:
#   todo        URL verified, file not yet pulled into raw/
#   downloaded  file is present on disk
#   free-alt    using a free alternative because original is paywalled — see notes
#   paid        original is paid; manifest holds purchase URL — buy and drop in later
